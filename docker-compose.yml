# Local PostgreSQL for audit logging (and future user data migration).
# Usage:
#   docker compose up -d
#   echo DATABASE_URL=postgres://banking:banking@127.0.0.1:5433/banking >> server/.env
#   npm run dev:notify

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
      POSTGRES_DB: banking
    ports:
      - '5433:5432'
    volumes:
      - banking_pg:/var/lib/postgresql/data

volumes:
  banking_pg:
